[project]
name = "clean-comments"
version = "0.0.1"
description = "Clean your comments"
readme = "README.md"
authors = [{name = "Ben Weddle", email = "ben.weddle@gmail.com"}]
maintainers = [{name = "Ben Weddle", email = "ben.weddle@gmail.com"}]
requires-python = ">=3.10"
dependencies = ["regex"]

[project.urls]
Repository = "https://pointlessapi.com"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["clean_comments*"]

[project.scripts]
clean = "clean_comments.cli:main"